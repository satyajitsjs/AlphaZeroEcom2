<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Register &ndash; VELORA</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #f8f5f2;
        color: #2d2d2d;
        font-family: "Poppins", sans-serif;
        font-size: 15px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      h1,
      h2,
      h3 {
        font-family: "Playfair Display", serif;
        line-height: 1.2;
      }
      .navbar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: #fff;
        box-shadow:
          0 1px 0 #e8e4de,
          0 2px 16px rgba(0, 0, 0, 0.05);
        height: 64px;
        display: flex;
        align-items: center;
      }
      .nav-inner {
        max-width: 1280px;
        margin: 0 auto;
        width: 100%;
        padding: 0 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .nav-logo {
        font-family: "Playfair Display", serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.12em;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 36px;
      }
      .nav-links a {
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #6b6b6b;
        transition: color 0.2s;
      }
      .nav-links a:hover,
      .nav-links a.active {
        color: #2d2d2d;
      }
      .cart-wrap {
        position: relative;
        display: inline-flex;
        align-items: center;
      }
      .cart-badge {
        position: absolute;
        top: -8px;
        right: -10px;
        background: #c8a97e;
        color: #fff;
        font-size: 10px;
        font-weight: 700;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .hamburger {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
      }
      .hamburger span {
        display: block;
        width: 24px;
        height: 2px;
        background: #2d2d2d;
        margin: 5px 0;
      }
      .mobile-menu {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 64px;
        left: 0;
        right: 0;
        background: #fff;
        border-top: 1px solid #e8e4de;
        padding: 16px 32px 24px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        z-index: 99;
      }
      .mobile-menu.open {
        display: flex;
      }
      .mobile-menu a {
        padding: 12px 0;
        border-bottom: 1px solid #e8e4de;
        font-size: 14px;
        font-weight: 500;
        color: #2d2d2d;
      }
      .mobile-menu a:last-child {
        border: none;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 28px;
        background: #c8a97e;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-family: "Poppins", sans-serif;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.15s,
          box-shadow 0.2s;
      }
      .btn:hover {
        background: #b89666;
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(200, 169, 126, 0.32);
      }
      .btn-outline {
        background: transparent;
        color: #2d2d2d;
        border: 1.5px solid #e8e4de;
      }
      .btn-outline:hover {
        background: #f8f5f2;
        border-color: #c8a97e;
        color: #c8a97e;
        box-shadow: none;
      }
      .btn-sm {
        padding: 9px 18px;
        font-size: 12px;
      }
      .section-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #c8a97e;
        margin-bottom: 10px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 18px;
      }
      .form-group label {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #6b6b6b;
      }
      .form-group input {
        padding: 12px 16px;
        border: 1.5px solid #e8e4de;
        border-radius: 8px;
        background: #fff;
        color: #2d2d2d;
        font-family: "Poppins", sans-serif;
        font-size: 14px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .form-group input:focus {
        border-color: #c8a97e;
        box-shadow: 0 0 0 3px rgba(200, 169, 126, 0.15);
      }
      .register-page {
        min-height: calc(100vh - 64px);
        display: flex;
        align-items: center;
        padding: 48px 20px;
      }
      .register-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        max-width: 980px;
        width: 100%;
        margin: 0 auto;
        background: #fff;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.1);
        border: 1px solid #e8e4de;
      }
      .register-visual {
        position: relative;
        min-height: 540px;
        background: url("https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=900&q=80")
          center/cover;
      }
      .vis-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(45, 45, 45, 0.72),
          rgba(200, 169, 126, 0.3)
        );
      }
      .vis-content {
        position: absolute;
        bottom: 40px;
        left: 36px;
        right: 36px;
        color: #fff;
      }
      .vis-logo {
        font-family: "Playfair Display", serif;
        font-size: 28px;
        letter-spacing: 0.12em;
        margin-bottom: 12px;
      }
      .vis-content p {
        color: rgba(255, 255, 255, 0.7);
        font-size: 15px;
        line-height: 1.6;
      }
      .register-form-wrap {
        padding: 48px 44px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .terms-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 18px;
        font-size: 13px;
        color: #6b6b6b;
      }
      .terms-row input {
        margin-top: 4px;
      }
      .helper-link {
        color: #c8a97e;
        font-weight: 500;
      }
      @media (max-width: 900px) {
        .register-container {
          grid-template-columns: 1fr;
        }
        .register-visual {
          display: none;
        }
      }
      @media (max-width: 768px) {
        .register-form-wrap {
          padding: 40px 28px;
        }
        .nav-inner {
          padding: 0 20px;
        }
        .nav-links {
          display: none;
        }
        .hamburger {
          display: block;
        }
      }
      @media (max-width: 520px) {
        .form-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-inner">
        <a href="index.html" class="nav-logo">VELORA</a>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="products.html">Products</a>
          <a href="cart.html" style="position: relative"
            >Cart<span
              class="cart-badge"
              style="position: absolute; top: -8px; right: -16px"
              >0</span
            ></a
          >
          <a href="login.html" class="btn btn-sm" id="authLink">Login</a>
        </div>
        <div style="display: flex; align-items: center; gap: 16px">
          <button class="hamburger" id="menuToggle">
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
      <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">Home</a><a href="products.html">Products</a
        ><a href="cart.html">Cart</a
        ><a href="login.html" id="mobileAuthLink">Login</a>
      </div>
    </nav>

    <div class="register-page">
      <div class="register-container">
        <div class="register-visual">
          <div class="vis-overlay"></div>
          <div class="vis-content">
            <div class="vis-logo">VELORA</div>
            <p>
              Join the VELORA club to track your orders, save your details, and
              unlock member offers.
            </p>
          </div>
        </div>
        <div class="register-form-wrap">
          <div class="section-label">Create Account</div>
          <h2 style="font-size: 28px; margin-bottom: 8px">Sign Up</h2>
          <p style="color: #6b6b6b; font-size: 14px; margin-bottom: 24px">
            Create your account in a minute.
          </p>
          <div class="form-row">
            <div class="form-group">
              <label>Full Name *</label>
              <input type="text" id="regName" placeholder="Your name" />
            </div>
            <div class="form-group">
              <label>Email *</label>
              <input type="email" id="regEmail" placeholder="you@email.com" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Phone *</label>
              <input
                type="tel"
                id="regPhone"
                placeholder="10-digit number"
                maxlength="10"
                inputmode="numeric"
              />
            </div>
            <div class="form-group">
              <label>Password *</label>
              <input
                type="password"
                id="regPass"
                placeholder="Create a password"
                minlength="6"
              />
            </div>
          </div>
          <div class="terms-row">
            <input type="checkbox" id="regTerms" />
            <label for="regTerms">
              I agree to the <span class="helper-link">Terms</span> and
              <span class="helper-link">Privacy Policy</span>.
            </label>
          </div>
          <button class="btn" style="width: 100%" onclick="createAccount()">
            Create Account
          </button>
          <div
            style="
              text-align: center;
              font-size: 13px;
              color: #6b6b6b;
              margin-top: 16px;
            "
          >
            Already have an account?
            <a href="login.html" class="helper-link">Login</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      function getCart() {
        return JSON.parse(localStorage.getItem("velora_cart") || "[]");
      }
      function updateBadge() {
        var n = getCart().reduce(function (s, i) {
          return s + i.qty;
        }, 0);
        document.querySelectorAll(".cart-badge").forEach(function (el) {
          el.textContent = n;
          el.style.display = n > 0 ? "flex" : "none";
        });
      }
      function toast(msg) {
        var e = document.querySelector(".v-toast");
        if (e) e.remove();
        var t = document.createElement("div");
        t.className = "v-toast";
        t.innerHTML = "&#10003; " + msg;
        t.style.cssText =
          "position:fixed;bottom:32px;right:32px;z-index:9999;background:#2D2D2D;color:#fff;padding:14px 22px;border-radius:8px;font-family:Poppins,sans-serif;font-size:14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.18)";
        document.body.appendChild(t);
        setTimeout(function () {
          t.style.opacity = "0";
          t.style.transition = "opacity .3s";
          setTimeout(function () {
            t.remove();
          }, 300);
        }, 2500);
      }
      function getUser() {
        try {
          return JSON.parse(localStorage.getItem("velora_user") || "{}");
        } catch (e) {
          return {};
        }
      }
      function getProfile() {
        try {
          return JSON.parse(localStorage.getItem("velora_profile") || "null");
        } catch (e) {
          return null;
        }
      }
      function saveProfileData(profile) {
        localStorage.setItem("velora_profile", JSON.stringify(profile));
      }
      function makeUid() {
        return "U-" + Math.floor(100000 + Math.random() * 900000);
      }
      function syncAuthLinks() {
        var user = getUser();
        var loggedIn = user && user.loggedIn;
        var link = document.getElementById("authLink");
        var mobile = document.getElementById("mobileAuthLink");
        if (loggedIn) {
          if (link) {
            link.textContent = "Account";
            link.href = "profile.html";
          }
          if (mobile) {
            mobile.textContent = "Account";
            mobile.href = "profile.html";
          }
        } else {
          if (link) {
            link.textContent = "Login";
            link.href = "login.html";
          }
          if (mobile) {
            mobile.textContent = "Login";
            mobile.href = "login.html";
          }
        }
      }
      function createAccount() {
        var name = document.getElementById("regName").value.trim();
        var email = document.getElementById("regEmail").value.trim();
        var phone = document.getElementById("regPhone").value.trim();
        var pass = document.getElementById("regPass").value.trim();
        var terms = document.getElementById("regTerms").checked;
        if (!name) {
          toast("Please enter your full name");
          return;
        }
        if (!/^\S+@\S+\.\S+$/.test(email)) {
          toast("Please enter a valid email");
          return;
        }
        if (!/^\d{10}$/.test(phone)) {
          toast("Please enter a valid 10-digit phone number");
          return;
        }
        if (pass.length < 6) {
          toast("Password must be at least 6 characters");
          return;
        }
        if (!terms) {
          toast("Please accept the terms to continue");
          return;
        }
        var uid = makeUid();
        var user = { loggedIn: true, uid: uid, phone: phone };
        localStorage.setItem("velora_user", JSON.stringify(user));
        var profile = getProfile() || {};
        profile.uid = uid;
        profile.name = name;
        profile.email = email;
        profile.phone = phone;
        profile.address = profile.address || "";
        profile.city = profile.city || "";
        profile.state = profile.state || "";
        profile.pincode = profile.pincode || "";
        profile.landmark = profile.landmark || "";
        saveProfileData(profile);
        toast("Account created! Redirecting...");
        setTimeout(function () {
          location.href = "profile.html";
        }, 1200);
      }
      document
        .getElementById("menuToggle")
        .addEventListener("click", function () {
          document.getElementById("mobileMenu").classList.toggle("open");
        });
      updateBadge();
      syncAuthLinks();
      if (getUser().loggedIn) {
        location.href = "profile.html";
      }
    </script>
  </body>
</html>
